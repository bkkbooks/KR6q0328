body:
  text: 嗣法門人先覩祖燈等録楚黃大石山十六世孫機雲編古齊大悲寺十五世孫真雄梓據室升夫子之堂者聞其道升老君之堂者觀其好入山僧之室者覔甚碗以柱杖連卓三下上堂諸聖情存見網難透不立階級入步無門般若之智常明真如之體獨露諸方學者心地不明皆因邪師雜糅如蠶作繭似蛇戀窟自謂到家不肯見人間有聰明以意識卜度儱侗真如瞞頇佛性誠可憫哉結制上堂煽烈𦦨於大千界內直下片雲飛舞舉鉗錘於妙密場中就裡點鐵成金赤沙灘上杖林山中箇箇餐砒霜飲鴆毒冰稜上走劍刃上行所謂鑊湯無冷處汝等抱定枯桐守住死灰何日豆𪹼西菴今日為汝爐內添炭好著精彩上堂震聲一喝曰此第一義諦一彈指頃頓空塵劫不涉津梁直入寶所為甚落在古田和尚椎下衆中有辨得出者麼問答不録乃舉臨濟示衆曰有時奪人不奪境有時奪境不奪人有時人境俱奪有時人境俱不奪師曰奪也山青水淥李白桃紅不奪也山青水淥李白桃紅且道奪也如何不奪也如何良久喝一喝云等間却定心劍依舊眉毛眼上橫冬至上堂二儀之大可以章程測也三光之動可以圭表度也雷霆之聲可以鍾鼓傳也風雨之變可以音律叶也夫有象可觀不能匿其量有光可見不能隱其迹有聲可聞不能藏其響有色可察不能滅其性故天地陰陽之理難明猶可以術數揆而人物性情之妙不可以意識測所以千聖疊興萬賢繼起橫説竪説顛説倒説金剛圈栗棘蓬種種説只要諸人直下承當西菴今日將五臟六腑一齊吐出亦要諸人識得是西菴長老肚裡底東西上堂參禪不貴明心誦經豈圖達理卞和抱璞而泣愁雕鑿之無功墨子握絲而悲嘆紛紜之自起忘功絶謂所貴出身有路上堂螻蟻無言而能辨事蒼蠅無識而能辨臭佛是覺義法是句義無孔鐵鎚與氈拍板還肯成佛否上堂達磨面壁不會唐言魯祖面壁不會甚麼大衆者裡薦得發越朕兆未形底消息提持佛祖既令底權衡直得虗空肅啓大地瞻依零丁子懶瓚翁一跛一跌退身於娑羅峰頭寒山兄拾得弟相呼相喚踏步于石梁橋畔一出山去永不回來何故將謂鬍須赤更有赤鬚鬍上堂靈山會上草深一丈少室峰前雪深三尺膠柱鼓瑟只許兩人上堂廣額擲刀立錐無地龍女獻珠瞻顧猶多衲僧門下獨脫無依寸絲不挂又作麼生上堂大唐國中盡是噇酒糟漢瑞巖者裡要個不會禪底作國師甚處得來上堂三關既透何必竊符別出奇兵先勘公驗上堂白雲道端的得一回汗出一莖草上現出瓊樓玉殿端的一回汗不出瓊樓玉殿被一莖草遮却白雲老子如斯告報將謂藏盡楚天月猶存漢地星瑞巖則不然端的得一回汗出填溝塞壑端的一回汗不出繫包頂笠朝遊暮住不妨自怡自悅因甚如此不見道庭前生瑞草好事不如無上堂舉洞山示衆云秋初夏末兄弟東去西去直須向萬里無寸草處去只如萬里無寸草處作麼生去後有僧舉似石霜霜云出門便是草洞山云大唐國裡能有幾人國清和尚曰一人舌上有十字關一人腳下有五色線撿點得出與你一緉草鞋師曰二尊宿一人頭戴三山一人腳踏四海相到不相知國清老人恁麼道是成褫語草本猶未拈出萬里無寸草處且置只如石霜道出門便是草意在何如撿點得出與你白銀二兩上堂舉僧問雲門秋初夏末前途忽有問將何祗對門云大衆退後云過在甚處雲云還我九十日飯錢來國清和尚云入虎穴探虎子也不易者僧爭奈死在平地上大衆要識雲門麼一腳短一腳長師曰敲虗空出骨髓剖微塵出經卷衲僧本分生涯者僧既入龍門不諳水勢只為分明極返令所得遲大衆要識雲門麼試看國清道的上堂不是心不是佛不是物突出難辨名不得狀不得類不得笑殺旁觀大衆瑞巖老漢與你諸人灑灑落落去也擲下拂子云青山只解磨今古流水何曾洗是非上堂舉國清和尚云五峰影裡雙澗聲中有大寶藏八面玲瓏諸人在此著到許多時節因甚眼看不出只説不通山僧今日直下打開去也竪柱杖云者個是祕魔一把叉橫拄杖云者個是道吾一柄劍打三圓相云者個是雪峰三個木毬阿呵呵且不是曹溪路上剎竿頭風動幡幡動風自南自北自西自東師曰百千三昧無量法門若作一句説佛祖吞聲不作一句説纍他千聖總不恁麼又是不説而説且説又説個甚麼莫若真實告報與大衆作個撇脫驀拈拄杖云者個是瑞巖拄杖喚甚麼作祕魔叉道吾劍又喚甚麼作雪峰毬國清老人恁麼道畢竟風動幡幡動風瑞巖喫盡娘生只到得者裡大衆珍重上堂舉溈山云行腳高士直須向聲色裡坐聲色裡臥踈山出云如何是不落聲色句溈竪起拂子山云此猶是落聲色句溈便歸方丈山不契遂辭香嚴嚴云何不且住云某甲與和尚無緣云有何因緣不契山舉前話嚴云某甲有個語云道甚麼云言發非聲色前不物山云元來此間有人師兄去後有個住處某甲却來相伴溈至晚問嚴矮闍黎在麼云已去了溈云向你道甚麼云某甲亦曾對他來溈云試舉看云言發非聲色前不物溈云他道甚麼云他深肯之溈失笑云我將謂矮子有長處元來只在者裡此子向後有個住處近山無柴燒近水無水喫師云溈山踞虎頭只知有後香嚴把虎尾只知有前正眼看來二尊宿總出矮闍黎縵天網子不得汝若不信三十年後有人證明全真道士請上堂千斤石輥水上浮四兩葫蘆沉到底火燒狗尾豬頭焦南辰竄入北斗裡汝等諸人者裡具得一雙眼不但本命元辰有個落處四威儀中著著有出身之路上堂破沙盆挨拶不開花藥籃收拾不起忽遇籌䇿不到的步上前掇轉鼎同致太平大梵天王口喃喃道汝等雖有坐具地也要善護念諸菩薩山僧聞得驀頭與他一棒天王道俊哉好拄杖不是我等大難承當雖是恁麼見解略較些子上堂碧桃愛春風黃菊喜秋雨驀拈拄杖云者個不涉春秋活如龍雄如虎卓一卓云者裡也有權也有實也有照也有用諸仁者作麼生商量時有僧出便喝師打云你也不怕旁觀者哂僧擬議師又打圓華嚴經上堂如經所云無少法為智所入亦無少智而入於法者是以架一智箭破衆魔軍揮一慧刀斬諸疑網斯乃妙悟之力倘或未然雖修智慧不入圓常縱行門惟增我慢蓋未達一際之門是名圓覺法亦名我慢幢若是妙悟真宗頓契一乘必須福慧兩圓行解俱到舉一步直蹈毗盧頂上彈一指遍遊百億國中現菩薩種種身雲成就盡佛世界無量無邊之勝事果能如此舉足下足無非福城入林出林總是妙峰依文殊大智海獅子哮吼入普賢毛孔中象王回顧開彌勒之樓閣法法頭頭而不捨示觀音之慈相塵塵剎剎以交輝苟非其人且看善財最初參的德雲比丘為甚麼在別峰相見者裡看得透我為你保任此事終不虗也小參參禪學道乃出世第一大事要了脫生死須具擇法眼辨邪正識好惡取友要端互相䇿發昔南公在泐潭會下雲峰一見稱為道器惜未受本色鉗錘一日會遊西山夜話雲門法道峰曰泐潭雖是雲門之後其法道則異矣南公詰其所以異峰曰雲門如九轉丹砂點鐵成金泐潭如藥汞銀徒可玩入煆則流去南怒以枕擊之明日雲峰謝過又曰雲門氣宇如王甘死語下乎泐潭有法授人死語也死語豈能活人乎即背去南公挽之曰若如是則誰可汝意峰曰石霜圓手段出諸方子宜見之不可後也南公見石霜果於言下開解假使南公不遇雲峰而雲峰器識有差南公履踐安有此又如夾山上堂有僧問如何是法身曰法身無相如何是法眼曰法眼無瑕適道吾在旁失笑夾山下座叩其所以吾曰和尚一等出頭人未有師在山即茫然自失意欲道吾説破吾遂指參船子果於船子處大悟假道吾若無如是眼目則夾山安有此此老信力不如法眼不正縱遇良友亦當面錯過且師家垂手接人處各各不一如臨濟德山一人用棒一人行喝石鞏架箭魯祖面壁禾山打鼓雪峰弄蛇雖行處各異然到家則一汝等諸人既在者裡相集辨道了脫生死第一要性燥器度要鴻大不可卑小昔山僧偶閲壇經見玄覺到曹溪繞祖三匝振錫一下卓然而立祖曰夫沙門者具三千威儀八萬細行大德自何方來生大我慢曰生死事大無常迅速祖曰何不體取無生了無速乎曰體即無生了本無速祖曰如是如是覺方具威儀禮拜即辭祖曰返太速乎曰本自非動豈有速耶祖曰誰知非動曰仁者自生分別祖曰汝甚得無生之意曰無生豈有意耶祖曰無意誰當分別山僧於此通身慶快如獲舊物不勝踴躍遂舉黃梅衣鉢因緣問鞏禪師曰既不會佛法為甚又紹祖位鞏曰不但祖師大有人不會佛法亦紹祖位山僧當日乍入其道鞏老入泥入水來引導山僧可謂血心片片山僧不識好惡當面錯過故又問和尚還紹祖位否鞏老曰若紹祖位即會佛法此時雖然不會鞏老意思幸具信力大起疑情必要討個明白即求芟染與天界日兄結伴參見數員知識雖無利益實賴東敲西擊之力在育王有僧持佛鑑上堂語至一見知為本色道流心心念念想去見他一日忽聞朝廷旨下詔住徑山其心喜之不數月杖錫果駐徑山時與日兄相依極久凡佛祖公案一一會盡惟不會四方八面來的因緣請益至再終不為説教令返觀自看不期佛鑑示疾山僧同衆請鑑遺偈鑑乃執筆顧山僧而書偈曰來時空索索去也赤條條更要問端的天台有石橋山僧稟命往謁斷橋老師於國清每每入室應機了無留礙老師笑而不語山僧發急不已凡入室請益屢蒙賜棒一日甚是迷悶危坐寮中忽覩同寮僧拿紙燭將進門面前豁然平生寶惜一時沒有了頓覺身心如琉璃一般山河大地亦如琉璃相似內外明徹無纖毫隔礙始知老師垂手處腳跟下好與二十拄杖次早入方丈通其所得老師一氣舉了數則公案勘驗山僧一一答了又舉萬法歸一話又答了老師只是不肯復招近前以手作砍勢云侍者你到底欠者一刀在山僧憤然走出大聲呌屈老師只是不肯齋畢普請擇菜次老師少刻到見山僧手也懶動遽問擇得乾淨麼對曰乾淨極了老師伸手向籃內拾起一莖莧根擲在山僧面前曰者是甚麼山僧於此脫然無礙老師撾鼓升堂謂衆曰寶侍者徹也移單入首座寮從此也不疑佛不疑祖五家宗旨千七百則公案亦不疑也到與麼田地才成得個無事人優遊天地間真個逍遙真個快樂世出世間無有一物可比汝等諸人好心學道須到恁般田地方可休歇若不到恁般田地切忌中止化城汝等做工夫起疑情不妨取信古人言句所貴無別只在提持話頭不要看死句如趙州見僧參問曰上座曾到此間否曰曾到州曰喫茶去又僧參州問曾到此間否曰不曾到州曰喫茶去院主曰和尚曾到此間也喫茶不曾到此間也喫茶州喚院主主應諾州曰喫茶去此皆活句也又有僧問西來意州曰庭前柏樹子其僧曰和尚莫將境示人州曰不將境示人曰如何是祖師西來意州曰庭前柏樹子此亦活句也汝等須信吾言但恁麼用心密密看去時時返觀刻刻覺察倘話頭見前便乃和身拶入如不見前頻頻舉起看是甚麼道理我却不會就向不會處一念萬年萬年一念於此討個明白不到古人田地誓不休歇夫人生天地諸行無常動轉施為是生滅法若無禪定工夫而發解佛祖妙理終難神契古人聞有恁般事把住繩頭站定腳跟或看個父母未生前或看個青州布衫或看萬法歸一或看麻三斤話頭如大將軍攝印登壇操持發縱生殺隨宜死生在頃刻掃蕩欃槍坐享大平汝等做工夫果能如此穿過銀山鐵壁轉箇身來回眸一看不獨父母未生已前消息即庭前柏樹子青州布衫三斤麻乾屎橛及五宗旨趣都是自家屋裡底至於發一言吐一辭與古人不別喜笑怒罵無非般若至理所以竺乾本師愍物興慈向火宅內垂手説法四十九年談經三百餘會曲盡老婆心末上拈花展轉相傳烜赫至今足下兒孫千波萬浪一波闊一波一浪高一浪莫可測其涯涘古人腳上也刺手上也刺逢咽喉也刺就地彈就窠子裡彈喝起來青天彈者般漢將謂手眼通身若值明眼人可發一笑何故聻要將祖宗間家具拈向當陽如天普蓋似地普擎直得虗空緘口須彌結舌此猶是轉句未為衲僧極則若論此事如萬仞巖頭相撲放著手直窮到底驀拈拄杖云瑞巖放著手汝等還曾到底也未擲拄杖云見處精明堪紹續洞觀妙理要虗玄小參古人有時建立有時掃蕩有時掃蕩中建立有時建立中掃蕩汝等諸人還會者消息磨若會出衆説道理看不然也須百草頭薦取祖師紅塵裡識認天子且個裡原有極趣豈凡情所測古人謂此事眨上眉毛即錯過擬議思量白雲萬里故曰目前無法意在目前不是目前法非耳目之所到此事如得處不真見處不的須欲優孟抵掌不可得也靈機獨脫大用現前不存軌則正令全提直示當人豈容安頓若欲天旋地斡徹古窮今直須壁立萬仞把住繩頭掀翻翳迹瞥然而起使默照者到者裡湊泊不得逐妄者到者裡入步無門果能如此一了百當纖塵不立飢便餐渴便飲日則起夜則眠忽于不經意處廓爾洞明始知古人誠不我欺也雖得如許境界正要遇人若不遇人只好倚門傍戶所以數千里之鯤化為九萬里之鵬必藉南冥之息若坳堂之水置杯則膠匪可同日而語乎然衲僧氣索鼻孔軒昂汝等若以見聞覺知解會與道懸殊必須親到親證只以解心湊泊他日太陽乃被寸雲掩却莫言不道小參離四句絶百非直得藏頭白海頭黑置箇事向上提持智者猶迷達人虧半引領符冥宗説差異把一句函天蓋地換斗移星正當恁麼時進前一步莫若退後一步進一步窄退一步寬寬則足以有容諸人不須別求要信自心是佛佛是自心自心即是佛心佛心即是自心自心顯現湛然常住無變無遷無動無搖無去無來無增無減故曰如如佛昔迦葉所契契此心也世尊所傳傳此心也達磨直指人心見性成佛二祖斷臂安心所指者此心所安亦此心也即此心之外別無法求夫求無上大道先明自心自心若明心外無別佛佛外無別心心佛一如不取善不捨惡淨穢兩途俱不依怙不取不捨之心念念現前故三界唯心萬法唯識古人有言凡所見色皆是見心心不自心因色故有汝但隨時言説即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此意乃可隨時穿衣喫飯水邊林下保養聖胎春到鳥棲無影樹時來花發不萠枝到如是田地拓條拄杖三曲四曲拽個布袋七零八碎或向三叉路口盤結草菴熟炊松粉接待往來或向十字街頭全身放倒和泥合水隨類演化或向孤峰頂上罪石誅茅搆樹為梁風月同住猿猱共遊此樂何極拈一句施一機塵塵剎剎全彰本地風光法法頭頭適絶兩邊功用末後超然自脫如水歸水似空合空既無蹤迹可尋安有聲色不透教忠若把第二杓惡水潑汝諸人諸人腳跟下黑漫漫地驀拈拂子畫一畫云向者裡撥開機道鑑地輝天摟碎佛祖腦蓋捩轉鼻孔巍巍蕩蕩絶此絶彼汝等諸人到者裡還有功用也無良久云止止不須説我法妙難思示衆世尊升座義出豐年文殊白椎家富兒嬌當時人天百萬倘有個出來道今日之事且莫草草文殊即有金椎在手也無下處惜乎無人下此一轉語若下此語文殊至今轉身不得雖然不因紫陌花開早乍見黃鸝上柳條示衆天台山中方廣寺裡五百應真常在石梁橋上捕風捉影寒山拾得倒跨猛虎默地走出布袋口拄杖頭跛跛挈挈各自散去大衆且道散去後又作麼生良久云歸堂喫茶示衆庭前柏樹子半黃半白青州七斤衫缺東缺西開山老祖怕受人瞞坐盤陀石上一呼一喏到底難免何以見得子規啼落三更月蝴蝶紛紛在上頭示衆靈雲見桃花悟道解心猶存香嚴聞擊竹徹去機智尚在怎似東村王麻鬍不識不知得錢便使示衆牛頭未見四祖百鳥銜花天人送供四祖一見百鳥不銜花天人不送供且道利害在甚麼處諸人不得作道理試下一轉語衆下語不契師代云眼裡不著沙示衆高高山頂立不解從空降下深深海底行不解從地湧出作麼生是掀翻函蓋截斷衆流一句師代云朗月堂空又云石梁橋師一日為衆挂牌入室垂語曰南泉斬却貓兒時如何衆下語不契適有一僕在旁曰老鼠做大師笑曰好一轉語只是不合從汝口裡出一源參師舉趙州勘婆子話詰之源曰盡大地人不奈趙州何師曰我則不然曰和尚作麼生師曰盡大地人不奈婆子何源於言下有省無見問如何是佛法大義師張口吐舌示之見罔措師拈拄杖趂出見即參珍公于天封理前話未竟珍亦打復返西菴途中把滑有省及見師師曰汝返何速見曰和尚此時打某甲不得師曰天封與你道甚麼見述途中因緣師又打見雖有所契終不自肯遂築室華頂精苦自勵一日作務次渙然頓釋所疑走瑞巖呈所解師以偈證曰道人得得出山來盡把襟懷對我開坦坦平平如鏡面澄澄湛湛絶纖埃忽然得個轉身句衲卷寒雲便歸去萬八千丈華頂峰一笑裂開鐵面具家山到後絶思惟拗折烏藤拄竹扉糞火堆中消息好芋香便是道香時即以源流并法衣付之偈曰此心極廣大虗空比不得此道只如是受持休外覔無盡燈參師竪拂子曰是甚麼燈亦曰是甚麼師曰與我除却四大別道一句燈從東過西師垂左足燈從西過東師垂右足燈近前叉手而立師拈拂便打燈禮拜又一日問達磨西來未審傳個甚麼師曰你道東土人曾少甚麼燈曰既不少神光為甚立雪斷臂師曰止圖破家蕩産燈于言下大悟僧問曹溪水派派朝東瑞巖水為甚流向西師曰上座好惡不識曰此來問水答好惡不識那師曰瞎漢果然不識便打僧曰如何是佛師曰巡人犯夜僧問如何是祖師西來意師曰正抓著我癢處僧問如何是般若體師曰八角磨盤曰如何是般若用師曰八角磨盤空裡走僧問如何是般若本師便打曰如何是般若用師又打師嘗設三問以驗學者曰真正出格高流如良馬見鞭影而行中下之士何堪希冀凡雲水高人下語恰當者破院子兩手分付問曰撑鐵船過海底人為甚麼向針孔裡呌屈既是臨濟大師為甚入舌犁耕那邊不立者邊不行截斷中間為甚不住增補上堂三世諸佛六代祖師在你諸人腳跟下還有踏得著者麼良久云若踏不著三世諸佛六代祖師在你諸人頂𩕳上屙上堂山僧一夏與諸人説底總是世諦之談與那事略無干涉若要與那事相應直須向世諦中明取儻不如斯向後逢人切不得道在祇園過夏上堂一雞二犬三豕四羊新年佛法已為舉揚儻或觀聽尚留便見五馬六牛七人八穀去也上堂百骸俱潰散一物鎮長靈拈拄杖者箇是拄杖子那箇是長靈一物擲下拄杖何似南山鱉鼻蛇上堂一夏以來東敲西擊費盡手腳為汝諸人得徹困賴是恬然不顧設若一箇半箇眼睛定動老僧定入無間地獄臘八上堂北斗七南斗八夜夜光生人人眼活老瞿曇突然道箇奇哉是甚樹栽竹栽魚栽菜栽上堂禪和家氣宇如王幾肯放頭低人半箬葉地為甚逗到今日各各不敢做一動子良久山中九十日雲外一千年出于增集續傳燈録第五卷淨慈方山寶禪師本傳
