front:
  text: 方山和尚語録序夫逸世之祕藏于珍者無如煬帝之珠卞和之璧而極至之矣適壬申秋余過檇李訪晦嶽兄於長塘李莊齋中茶敘間即示方山祖録余展讀撫几而歎曰真世間之珍者耶若將珠玉比擬不過在世之一流常物耳我方山祖録實淑世之真燈照耀昏衢況言言見諦字字超宗又從我天台夢帆測兄獲之亦甚奇焉爰測兄初遊台鴈時偶於破院古佛像座下廢藏書中見其杇蠧之餘字義璨然奪目近閲之語句絶群再閲之乃寶祖録也即命筆謄之恨其帙貝腐爛不堪任手首尾脫落僅得十之一二深為可惜置諸篋中迄今十餘載矣測兄與晦兄皆里人也康熙辛未春訪晦兄于龍淵盤桓月餘訊其祖源歷代機語乃出寶祖録示之曰此君家物也晦兄驚喜秉爐拜誦何止煬珠卞璧之出現于世也哉煬珠卞璧蓋世間希有之珍也而我祖法語實出世間無上之大寶也晦兄告余曰今我妙雲法叔欲捐衣鉢之資謀付諸梓以廣流傳乞一言以表我祖語録所得奇緣俾後之讀是録者抑知夢帆兄於遊山玩水之際遇古人言句不肯輕易放過而又持歸于余令彼分門列戶之徒特勢凌孤之輩以曉前人用心之處之不自欺也余曰然誠哉是言也吾雖不敏誼不容辭抵暮掉歸梵受客窗篝燈勉就未易言敘也容質之瑞巖古佛方山祖慧寂光分鑑余可否住南嶽兜率辨山三葉棄人氏智安拜首題并書
